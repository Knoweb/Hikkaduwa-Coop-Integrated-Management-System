server:
  port: 9001  # Use 9001, since 9000 is taken by Auth

spring:
  application:
    name: beer-garden-service
  datasource:
    # Point to the same DB, but ensure your Hibernate dialect/ddl-auto is configured
    url: jdbc:postgresql://localhost:5433/coop_db?currentSchema=schema_beer_garden
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true