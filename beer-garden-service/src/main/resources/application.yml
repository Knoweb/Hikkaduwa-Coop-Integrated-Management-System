server:
  port: 9004

spring:
  application:
    name: beer-garden-service
  datasource:
    # Bulletproof config: Defaults to localhost:5433 for local IDE development.
    # Docker Compose will override these with DB_HOST=postgres-db and DB_PORT=5432.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/coop_db?currentSchema=schema_beer_garden
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # (Pro-tip: Once your coop.sql is fully finalized, change this to 'validate')
    show-sql: true

logging:
  level:
    com.coop.beer_garden_service: DEBUG
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      # Defaults to localhost for local dev. Docker Compose will inject EUREKA_HOST=discovery-server.
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true