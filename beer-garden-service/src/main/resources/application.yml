server:
  port: 9001

spring:
  application:
    name: beer-garden-service
  datasource:
    url: jdbc:postgresql://localhost:5433/coop_db?currentSchema=schema_beer_garden
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    com.coop.beer_garden_service: DEBUG
    org.springframework.web: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true