server:
  port: 9001 # Assigned port for Admin Service

spring:
  application:
    name: admin-service
  datasource:
    # Bulletproof config: Defaults to localhost:5433 for local IDE development.
    # Docker Compose will override these with DB_HOST=postgres-db and DB_PORT=5432.
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/coop_db?currentSchema=schema_admin
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # STRICT RULE: Never let Hibernate create/drop tables. We use coop.sql for that.
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      # Defaults to localhost for local dev. Docker Compose will inject EUREKA_HOST=discovery-server.
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true