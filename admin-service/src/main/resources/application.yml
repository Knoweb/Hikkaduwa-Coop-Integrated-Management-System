server:
  port: 8085 # Assigned port for Admin Service

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://localhost:5433/coop_db?currentSchema=schema_admin
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # STRICT RULE: Never let Hibernate create/drop tables. We use coop.sql for that.
    show-sql: true
    properties:
      hibernate:
        format_sql: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Points to your discovery-server
  instance:
    prefer-ip-address: true