server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Defaults to local Vite port (5173). 
            # In Docker/Production, inject the Droplet IP or domain name here.
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - AuthenticationFilter

        - id: beer-garden-service
          uri: lb://BEER-GARDEN-SERVICE
          predicates:
            - Path=/api/v1/beer-garden/**
        
        - id: milk-shop-service
          uri: lb://MILK-SHOP-SERVICE 
          predicates:
            - Path=/api/v1/milk-shop/**

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/api/v1/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true