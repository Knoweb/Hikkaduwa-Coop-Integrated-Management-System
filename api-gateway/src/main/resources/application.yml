server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # 1. GLOBAL CORS POLICY: This allows your React app to pass the preflight check
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      # 2. ROUTING MATRIX: Corrected standard Spring syntax
      routes:
        - id: auth-service
          # 3. LOAD BALANCING: Since Eureka is on, we tell the Gateway to find the Auth Service by its registered name, not a hardcoded port.
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - AuthenticationFilter

# 4. SERVICE REGISTRY: Turn these on so the Gateway can find the map
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/